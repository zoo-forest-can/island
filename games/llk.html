    <script>
                // ===== 音效系統 =====
        let audioCtx = null;
        let bgGainNode = null;
        let isMuted = false;
        let bgOscillators = [];
        let musicStarted = false;

        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                bgGainNode = audioCtx.createGain();
                bgGainNode.gain.value = 0.12;
                bgGainNode.connect(audioCtx.destination);
            }
            return audioCtx;
        }

        function playNote(freq, duration, type='sine', volume=0.25, delay=0) {
            if (isMuted) return;
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = type;
            osc.frequency.value = freq;
            const start = ctx.currentTime + delay;
            gain.gain.setValueAtTime(volume, start);
            gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
            osc.start(start);
            osc.stop(start + duration + 0.05);
        }

        // 柔和五聲音階旋律（C 大調 C4 八度，輕柔流動）
        const MELODY = [
            [330,1.0],[294,0.5],[262,1.0],[294,0.5],
            [330,0.6],[392,0.5],[440,1.0],[392,0.5],
            [330,1.0],[294,0.5],[262,1.4],
            [220,0.7],[247,0.5],[262,1.0],[330,0.5],
            [392,0.7],[330,0.5],[294,1.0],[262,0.7],
            [220,1.4],
        ];

        let musicTimer = null;
        let noteIdx = 0;

        function scheduleMelody() {
            if (isMuted || !audioCtx) return;
            const [freq, dur] = MELODY[noteIdx % MELODY.length];
            // 主旋律：柔和 sine，低音量
            playNote(freq, dur * 1.1, 'sine', 0.13);
            // 低八度柔和和聲
            if (noteIdx % 3 === 0) playNote(freq / 2, dur * 1.4, 'sine', 0.05);
            noteIdx++;
            const next = (MELODY[noteIdx % MELODY.length]?.[1] || 0.6) * 820;
            musicTimer = setTimeout(scheduleMelody, next);
        }

        function startMusic() {
            if (musicStarted || isMuted) return;
            musicStarted = true;
            getAudioCtx();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            scheduleMelody();
        }

        function stopMusic() {
            musicStarted = false;
            if (musicTimer) clearTimeout(musicTimer);
        }

        function sfxMatch() {
            if (isMuted) return;
            playNote(523, 0.1, 'sine', 0.3);
            playNote(659, 0.15, 'sine', 0.25, 0.08);
            playNote(784, 0.2, 'sine', 0.2, 0.16);
        }

        function sfxFail() {
            if (isMuted) return;
            playNote(180, 0.15, 'sawtooth', 0.15);
            playNote(150, 0.2, 'sawtooth', 0.1, 0.1);
        }

        function sfxLevelClear() {
            if (isMuted) return;
            [392,523,659,784].forEach((f,i) => playNote(f, 0.35, 'sine', 0.22, i*0.13));
        }

        function sfxHint() {
            if (isMuted) return;
            playNote(880, 0.12, 'sine', 0.2);
            playNote(1047, 0.18, 'sine', 0.15, 0.1);
        }

        function sfxShuffle() {
            if (isMuted) return;
            [440,523,440,523,659].forEach((f,i) => playNote(f, 0.08, 'sine', 0.18, i*0.07));
        }

        document.addEventListener('click', () => { startMusic(); }, { once: true });
        // ===== 音效系統結束 =====


        const CANVAS = document.getElementById('gameCanvas');
        const CTX = CANVAS.getContext('2d');
        const FB_URL = 'https://zoo-forest-7132c-default-rtdb.asia-southeast1.firebasedatabase.app';
        const FB_PATH = 'lb_llk';
        
        const TILE_PALETTE = [
            ['#FF6B6B','#FF9090'],  // 0 紅
            ['#26C6C0','#4EE8E2'],  // 1 青綠（更飽和）
            ['#FFD93D','#FFE870'],  // 2 黃
            ['#74DDB8','#96EDD0'],  // 3 薄荷綠（更鮮）
            ['#B388E8','#CCA8FF'],  // 4 薰衣草（更深）
            ['#FF8FAB','#FFB3C6'],  // 5 粉（更飽和）
            ['#64B5F6','#90CAF9'],  // 6 水藍（更鮮）
            ['#9575CD','#B39DDB'],  // 7 深紫
            ['#F48FB1','#F8BBD9'],  // 8 玫瑰
            ['#8BC34A','#AED581'],  // 9 草綠
            ['#FFB300','#FFD740'],  // 10 金（更深）
            ['#4CAF50','#81C784'],  // 11 綠
            ['#2979FF','#5C9CFF'],  // 12 藍（更鮮）
            ['#E91E8C','#F06DAD'],  // 13 洋紅（更深）
            ['#FF7043','#FF9A80'],  // 14 橘（更飽和）
            ['#FF5722','#FF8A65'],  // 15 橘紅
        ];

        const TILE_EMOJIS = ['🐱','🐶','🐰','🐸','🦊','🐻','🐼','🐨','🦁','🐯',
            '🦄','🐺','🦋','🐘','🦒','🦓','🦚','🦩','🦆','🦜',
            '🐢','🦎','🦞','🦀','🦑','🐙','🐠','🦈','🐋','🦐',
            '🐓','🦃','🐍','🦛','🦏','🐃','🐎','🐖','🐑','🐐',
            '🦌','🦨','🦡','🐿️','🦔','🦭','🐩','🦙'];

        const LEVELS = [
            { type: 'llk', cols: 8,  rows: 6, time: 70, pairs: 24, name: 'L1' },
            { type: 'llk', cols: 8,  rows: 6, time: 60, pairs: 24, name: 'L2' },
            { type: 'llk', cols: 10, rows: 6, time: 55, pairs: 30, name: 'L3' },
            { type: 'llk', cols: 10, rows: 8, time: 50, pairs: 40, name: 'L4' },
            { type: 'llk', cols: 12, rows: 8, time: 45, pairs: 48, name: 'L5' },
        ];

        const STACK_COLORS = ['#E74C3C','#3498DB','#2ECC71','#F39C12','#9B59B6'];

        let gameState = {
            state: 'title',
            currentLevel: 0,
            score: 0,
            combo: 0,
            lastComboTime: 0,
            time: 0,
            levelData: null,
            selected: null,
            path: [],
            hint: { available: 2, pair: null },
            shuffle: { available: 2 },
            particles: [],
            animatingPath: false,
            noLinkMsg: null,
            failFlash: null   // { row, col, time } 連線失敗閃紅光
        };

        let namePhase = "postgame";  // "pregame" 輸入名字階段 | "postgame" 提交排行榜階段

        class LLKGame {
            constructor(cols, rows, pairs) {
                this.cols = cols;
                this.rows = rows;
                this.pairs = pairs;
                this.board = [];
                this.init();
            }

            init() {
                this.board = [];
                const types = [];
                for (let i = 0; i < this.pairs; i++) {
                    types.push(i, i);
                }
                types.sort(() => Math.random() - 0.5);
                let idx = 0;
                for (let r = 0; r < this.rows; r++) {
                    this.board[r] = [];
                    for (let c = 0; c < this.cols; c++) {
                        this.board[r][c] = { type: idx < types.length ? types[idx] : -1, removed: false };
                        idx++;
                    }
                }
            }

            canConnect(r1, c1, r2, c2) {
                if (r1 === r2 && c1 === c2) return false;
                if (this.board[r1]?.[c1]?.type === -1 || this.board[r2]?.[c2]?.type === -1) return false;
                if (this.board[r1][c1].type !== this.board[r2][c2].type) return false;
                return this.findPath(r1, c1, r2, c2) !== null;
            }

            findPath(sr, sc, er, ec) {
                // ===== 原版 SWF 反組譯後還原的 Pivot Scan 算法 =====
                // 原理：嘗試所有可能的「中繼列 c」與「中繼行 r」（含虛擬邊框 -1 和 ROWS/COLS），
                // 對每個 pivot 做三段幾何直線檢查（最多 2 次轉彎）。
                //
                // 中繼列（horizontal pivot）路徑形狀：
                //   (sr,sc) ──水平──▶ (sr,c) ──垂直──▶ (er,c) ──水平──▶ (er,ec)
                //
                // 中繼行（vertical pivot）路徑形狀：
                //   (sr,sc) ──垂直──▶ (r,sc) ──水平──▶ (r,ec) ──垂直──▶ (er,ec)
                //
                // 一個格子「可通過」的條件：
                //   1. 兩個被選取的端點格（sr,sc）和（er,ec）→ 始終可通過
                //   2. 棋盤外圍虛擬邊框（-1 行/列 或 ROWS/COLS 行/列）→ 始終可通過
                //   3. 棋盤內已消除的空格（removed === true）→ 可通過
                //   4. 棋盤內未消除的方塊 → 阻擋

                const ROWS = this.rows, COLS = this.cols;

                const ok = (r, c) => {
                    if (r === sr && c === sc) return true;                    // 起點
                    if (r === er && c === ec) return true;                    // 終點
                    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true; // 虛擬邊框
                    return this.board[r][c].removed;                          // 空格
                };

                // 掃描水平線段：row r，從 c1 到 c2 的所有格子是否全部可通過
                const clearH = (r, c1, c2) => {
                    const lo = Math.min(c1, c2), hi = Math.max(c1, c2);
                    for (let c = lo; c <= hi; c++) if (!ok(r, c)) return false;
                    return true;
                };

                // 掃描垂直線段：col c，從 r1 到 r2 的所有格子是否全部可通過
                const clearV = (r1, r2, c) => {
                    const lo = Math.min(r1, r2), hi = Math.max(r1, r2);
                    for (let r = lo; r <= hi; r++) if (!ok(r, c)) return false;
                    return true;
                };

                // 嘗試所有中繼列 c（含虛擬邊框 -1 和 COLS）
                for (let c = -1; c <= COLS; c++) {
                    if (clearH(sr, sc, c) && clearV(sr, er, c) && clearH(er, c, ec)) {
                        return [[sr, sc], [sr, c], [er, c], [er, ec]];
                    }
                }

                // 嘗試所有中繼行 r（含虛擬邊框 -1 和 ROWS）
                for (let r = -1; r <= ROWS; r++) {
                    if (clearV(sr, r, sc) && clearH(r, sc, ec) && clearV(r, er, ec)) {
                        return [[sr, sc], [r, sc], [r, ec], [er, ec]];
                    }
                }

                return null; // 無法連線
            }

            removePair(r1, c1, r2, c2) {
                this.board[r1][c1].removed = true;
                this.board[r2][c2].removed = true;
            }

            getHint() {
                for (let r1 = 0; r1 < this.rows; r1++) {
                    for (let c1 = 0; c1 < this.cols; c1++) {
                        if (this.board[r1][c1].removed) continue;
                        for (let r2 = r1; r2 < this.rows; r2++) {
                            for (let c2 = (r1 === r2 ? c1 + 1 : 0); c2 < this.cols; c2++) {
                                if (this.board[r2][c2].removed) continue;
                                if (this.canConnect(r1, c1, r2, c2)) {
                                    return {r1, c1, r2, c2};
                                }
                            }
                        }
                    }
                }
                return null;
            }

            isCleared() {
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        if (!this.board[r][c].removed) return false;
                    }
                }
                return true;
            }
        }

        class StackGame {
            constructor(cols, rows, colorCount) {
                this.cols = cols;
                this.rows = rows;
                this.colorCount = colorCount;
                this.board = [];
                this.init();
            }

            init() {
                this.board = [];
                for (let r = 0; r < this.rows; r++) {
                    this.board[r] = [];
                    for (let c = 0; c < this.cols; c++) {
                        this.board[r][c] = Math.floor(Math.random() * this.colorCount);
                    }
                }
            }

            findConnectedGroup(r, c) {
                if (this.board[r]?.[c] === undefined) return [];
                const color = this.board[r][c];
                const visited = new Set();
                const group = [];
                const queue = [[r, c]];
                visited.add(`${r},${c}`);

                while (queue.length > 0) {
                    const [cr, cc] = queue.shift();
                    group.push([cr, cc]);
                    const dirs = [[0,1],[1,0],[0,-1],[-1,0]];
                    for (const [dr, dc] of dirs) {
                        const nr = cr + dr, nc = cc + dc;
                        const key = `${nr},${nc}`;
                        if (!visited.has(key) && this.board[nr]?.[nc] === color) {
                            visited.add(key);
                            queue.push([nr, nc]);
                        }
                    }
                }
                return group;
            }

            removeGroup(group) {
                if (group.length < 2) return [];
                const removed = [];
                for (const [r, c] of group) {
                    this.board[r][c] = -1;
                    removed.push([r, c]);
                }
                this.applyGravity();
                return removed;
            }

            applyGravity() {
                for (let c = 0; c < this.cols; c++) {
                    const col = [];
                    for (let r = 0; r < this.rows; r++) {
                        if (this.board[r][c] !== -1) col.push(this.board[r][c]);
                    }
                    for (let r = 0; r < this.rows; r++) {
                        this.board[r][c] = col[r] !== undefined ? col[r] : -1;
                    }
                }
            }

            isCleared() {
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        if (this.board[r][c] !== -1) return false;
                    }
                }
                return true;
            }
        }

        function createParticles(x, y, count, style) {
            count = count || 12;
            style = style || 'match';
            var colors, speed, gravity, lifespan;
            if (style === 'match') {
                colors = ['rgba(255,200,80,{a})','rgba(255,140,42,{a})','rgba(180,255,120,{a})','rgba(255,100,180,{a})'];
                speed = 10 + Math.random() * 6;
                gravity = 0.5;
                lifespan = 0.042;
            } else {
                colors = ['rgba(255,80,80,{a})','rgba(220,60,60,{a})'];
                speed = 7 + Math.random() * 4;
                gravity = 0.7;
                lifespan = 0.055;
            }
            for (var i = 0; i < count; i++) {
                var angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
                var sp = speed * (0.7 + Math.random() * 0.6);
                gameState.particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * sp,
                    vy: Math.sin(angle) * sp - 1,
                    life: 1.0,
                    decay: lifespan,
                    gravity: gravity,
                    size: 2 + Math.random() * 3,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function updateParticles(dt) {
            gameState.particles = gameState.particles.filter(function(p) {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vx *= 0.94;
                p.vy += p.gravity * dt;
                p.life -= p.decay * dt;
                return p.life > 0;
            });
        }

        function drawParticles() {
            for (var i = 0; i < gameState.particles.length; i++) {
                var p = gameState.particles[i];
                var a = p.life < 0.4 ? p.life / 0.4 : 1;
                var col = p.color.replace('{a}', (a * 0.9).toFixed(2));
                CTX.fillStyle = col;
                CTX.beginPath();
                CTX.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                CTX.fill();
            }
        }

        function initLevel(levelIdx) {
            gameState.currentLevel = levelIdx;
            const level = LEVELS[levelIdx];
            if (levelIdx === 0) gameState.score = 0;  // 只在遊戲開始（第0關）重置分數，過關繼續累積
            gameState.combo = 0;
            gameState.time = level.time;
            gameState.selected = null;
            gameState.path = [];
            gameState.hint.pair = null;       // 清除上一關的 hint 標記，但保留剩餘次數
            gameState.hint.showTime = null;
            // 每關重置道具次數
            gameState.hint.available = 2;
            gameState.shuffle.available = 2;
            gameState.particles = [];
            gameState.animatingPath = false;

            if (level.type === 'llk') {
                gameState.levelData = new LLKGame(level.cols, level.rows, level.pairs);
            } else {
                gameState.levelData = new StackGame(level.cols, level.rows, level.colors);
            }
            gameState.state = 'playing';
        }

        function handleCanvasClick(e) {
            if (gameState.state !== 'playing') return;
            const rect = CANVAS.getBoundingClientRect();
            // 座標縮放：修正全螢幕或容器縮放時的點擊偏移
            const scaleX = CANVAS.width / rect.width;
            const scaleY = CANVAS.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            const level = LEVELS[gameState.currentLevel];

            // 道具按鈕區域（HUD 正下方 y=50~84）：💡 提示 / 🔄 洗牌
            if (level.type === 'llk' && y >= 50 && y <= 84) {
                const midX = CANVAS.width / 2;
                if (x >= midX - 102 && x <= midX + 102) {
                    if (x < midX) {
                        handleHint();
                    } else {
                        handleShuffle();
                    }
                    return;
                }
            }

            if (level.type === 'llk') {
                handleLLKClick(x, y);
            } else {
                handleStackClick(x, y);
            }
        }

        function handleLLKClick(x, y) {
            // 動畫播放中不接受點擊，避免狀態錯亂
            if (gameState.animatingPath) return;

            const level = LEVELS[gameState.currentLevel];
            const tileSize = Math.min(Math.floor(CANVAS.width / level.cols), Math.floor((CANVAS.height - 80) / level.rows));
            const tileWidth = tileSize, tileHeight = tileSize;
            const offsetX = Math.round((CANVAS.width - tileSize * level.cols) / 2);
            const offsetY = Math.round(((CANVAS.height - 80) - tileSize * level.rows) / 2);
            const col = Math.floor((x - offsetX) / tileSize);
            const row = Math.floor((y - offsetY) / tileSize);

            if (row < 0 || row >= level.rows || col < 0 || col >= level.cols) return;
            if (gameState.levelData.board[row][col].removed) return;

            if (gameState.selected === null) {
                gameState.selected = [row, col];
            } else if (gameState.selected[0] === row && gameState.selected[1] === col) {
                // 點同一格 → 取消選取
                gameState.selected = null;
            } else {
                const [sr, sc] = gameState.selected;

                // 安全檢查：選中格若已被消除則重設
                if (gameState.levelData.board[sr]?.[sc]?.removed) {
                    gameState.selected = [row, col];
                    return;
                }

                if (gameState.levelData.canConnect(sr, sc, row, col)) {
                    const path = gameState.levelData.findPath(sr, sc, row, col);
                    gameState.path = path;
                    gameState.animatingPath = true;
                    gameState.levelData.removePair(sr, sc, row, col);

                    const tileX = offsetX + col * tileSize + tileSize / 2;
                    const tileY = offsetY + row * tileSize + tileSize / 2;
                    createParticles(tileX, tileY, 8);
                    sfxMatch();

                    gameState.combo++;
                    gameState.lastComboTime = Date.now();
                    const multiplier = Math.min(gameState.combo, 5);
                    gameState.score += 2 * 10 * multiplier;
                    gameState.time = Math.min(gameState.time + 5, LEVELS[gameState.currentLevel].time + 60);

                    setTimeout(() => {
                        gameState.animatingPath = false;
                        gameState.selected = null;
                        if (gameState.levelData.isCleared()) {
                            gameState.state = 'lvlclear';
                            sfxLevelClear();
                        }
                    }, 280);
                    setTimeout(() => { checkDeadlock(); }, 420);
                } else {
                    // 連線失敗：保留原選取格（不切換），僅在 console 輸出除錯資訊
                    console.log(`[LLK] 連線失敗: (${sr},${sc}) type=${gameState.levelData.board[sr][sc].type} ↔ (${row},${col}) type=${gameState.levelData.board[row][col].type}`);
                    // 若兩格類型相同但路徑不通，輸出更多資訊
                    if (gameState.levelData.board[sr][sc].type === gameState.levelData.board[row][col].type) {
                        console.log(`  ↳ 同類型但無路徑可通（需找到至多2轉彎的路線）`);
                        // 輸出周邊格子狀態
                        for (let dr = -1; dr <= 1; dr++) {
                            let rowInfo = '';
                            for (let dc = -1; dc <= 1; dc++) {
                                const nr = row+dr, nc = col+dc;
                                if (nr < 0 || nr >= level.rows || nc < 0 || nc >= level.cols) rowInfo += '  X  ';
                                else rowInfo += (gameState.levelData.board[nr][nc].removed ? '  .  ' : `[${gameState.levelData.board[nr][nc].type}] `);
                            }
                            console.log(`  ${rowInfo}`);
                        }
                    }
                    // 閃紅光提示（兩格都亮紅）
                    gameState.failFlash = { cells: [[sr, sc], [row, col]], time: Date.now() };
                    sfxFail();
                    // 切換到新格子（讓玩家可以繼續選其他配對）
                    gameState.selected = [row, col];
                }
            }
        }

        function handleStackClick(x, y) {
            const level = LEVELS[gameState.currentLevel];
            const tileWidth = CANVAS.width / level.cols;
            const tileHeight = (CANVAS.height - 80) / level.rows;
            const col = Math.floor(x / tileWidth);
            const row = Math.floor(y / tileHeight);

            if (row < 0 || row >= level.rows || col < 0 || col >= level.cols) return;
            if (gameState.levelData.board[row][col] === -1) return;

            const group = gameState.levelData.findConnectedGroup(row, col);
            if (group.length < 2) return;

            const removed = gameState.levelData.removeGroup(group);
            removed.forEach(([r, c]) => {
                const tileX = c * tileWidth + tileWidth / 2;
                const tileY = r * tileHeight + tileHeight / 2;
                createParticles(tileX, tileY, 4);
            });

            gameState.combo++;
            gameState.lastComboTime = Date.now();
            const multiplier = Math.min(gameState.combo, 5);
            gameState.score += group.length * 10 * multiplier;

            if (gameState.levelData.isCleared()) {
                gameState.state = 'lvlclear';
            }
        }

        function handleHint() {
            if (gameState.hint.available <= 0) return;
            const level = LEVELS[gameState.currentLevel];
            if (level.type !== 'llk') return;

            if (!gameState.hint.pair) {
                gameState.hint.pair = gameState.levelData.getHint();
            }
            if (gameState.hint.pair) {
                gameState.hint.available--;
                gameState.hint.showTime = Date.now();
            sfxHint();
            }
        }

        
        function checkDeadlock() {
            const level = LEVELS[gameState.currentLevel];
            if (level.type !== 'llk') return;
            const board = gameState.levelData.board;
            // 收集所有未消除的格子
            const live = [];
            for (let r = 0; r < level.rows; r++)
                for (let c = 0; c < level.cols; c++)
                    if (!board[r][c].removed) live.push([r, c]);
            // 隨機取樣最多 200 對來快速偵測是否有路
            let found = false;
            const tries = Math.min(live.length * live.length, 200);
            let checked = 0;
            for (let i = 0; i < live.length && !found; i++) {
                for (let j = i + 1; j < live.length && !found; j++) {
                    const [r1, c1] = live[i], [r2, c2] = live[j];
                    if (board[r1][c1].type === board[r2][c2].type) {
                        if (gameState.levelData.canConnect(r1, c1, r2, c2)) found = true;
                    }
                    if (++checked >= tries) break;
                }
            }
            if (!found && live.length > 0) {
                gameState.noLinkMsg = Date.now();
                // 只重新分配 tile 類型，位置不變（等同於 handleShuffle 但不扣次數）
                const types = live.map(([r, c]) => board[r][c].type);
                types.sort(() => Math.random() - 0.5);
                live.forEach(([r, c], i) => { board[r][c].type = types[i]; });
                gameState.hint.pair = null;
            }
        }

        function handleShuffle() {
            if (gameState.shuffle.available <= 0) return;
            const level = LEVELS[gameState.currentLevel];
            if (level.type !== 'llk') return;

            const remaining = [];
            for (let r = 0; r < level.rows; r++) {
                for (let c = 0; c < level.cols; c++) {
                    if (!gameState.levelData.board[r][c].removed) {
                        remaining.push(gameState.levelData.board[r][c]);
                    }
                }
            }
            remaining.sort(() => Math.random() - 0.5);

            let idx = 0;
            for (let r = 0; r < level.rows; r++) {
                for (let c = 0; c < level.cols; c++) {
                    if (!gameState.levelData.board[r][c].removed) {
                        gameState.levelData.board[r][c] = remaining[idx++];
                    }
                }
            }
            gameState.shuffle.available--;
            sfxShuffle();
        }

        function drawLLK() {
            const level = LEVELS[gameState.currentLevel];
            const tileSize = Math.min(Math.floor(CANVAS.width / level.cols), Math.floor((CANVAS.height - 80) / level.rows));
            const tileWidth = tileSize, tileHeight = tileSize;
            const offsetX = Math.round((CANVAS.width - tileSize * level.cols) / 2);
            const offsetY = Math.round(((CANVAS.height - 80) - tileSize * level.rows) / 2);

            for (let r = 0; r < level.rows; r++) {
                for (let c = 0; c < level.cols; c++) {
                    const tile = gameState.levelData.board[r][c];
                    if (tile.removed) continue;

                    const x = offsetX + c * tileSize;
                    const y = offsetY + r * tileSize;
                    const isSelected = gameState.selected && gameState.selected[0] === r && gameState.selected[1] === c;

                    const pad = 5;
                    const tw = tileWidth - pad*2;
                    const th = tileHeight - pad*2;
                    const tx = x + pad, ty = y + pad;
                    const radius = 10;
                    const pIdx = tile.type % TILE_PALETTE.length;
                    const [baseColor, lightColor] = TILE_PALETTE[pIdx];

                    // 漸層背景
                    const grad = CTX.createLinearGradient(tx, ty, tx + tw * 0.6, ty + th);
                    grad.addColorStop(0, lightColor + 'dd');
                    grad.addColorStop(0.4, baseColor);
                    grad.addColorStop(1, baseColor + '99');
                    CTX.fillStyle = grad;
                    CTX.beginPath();
                    CTX.roundRect(tx, ty, tw, th, radius);
                    CTX.fill();

                    // 頂部高光
                    const highlight = CTX.createLinearGradient(tx, ty, tx, ty + th * 0.4);
                    highlight.addColorStop(0, 'rgba(255,255,255,0.35)');
                    highlight.addColorStop(1, 'rgba(255,255,255,0)');
                    CTX.fillStyle = highlight;
                    CTX.beginPath();
                    CTX.roundRect(tx, ty, tw, th * 0.5, [radius, radius, 0, 0]);
                    CTX.fill();

                    // 外框
                    CTX.strokeStyle = lightColor + '88';
                    CTX.lineWidth = 1.5;
                    CTX.beginPath();
                    CTX.roundRect(tx, ty, tw, th, radius);
                    CTX.stroke();

                    // Emoji
                    CTX.fillStyle = '#fff';
                    const emojiSize = tileSize * 0.62;
                    CTX.font = `${emojiSize}px Arial`;
                    CTX.textAlign = 'center';
                    CTX.textBaseline = 'middle';
                    CTX.fillText(TILE_EMOJIS[tile.type % TILE_EMOJIS.length], x + tileWidth / 2, y + tileHeight / 2 + 1);

                    // 選取狀態：橘色 glow + 脈衝邊框
                    if (isSelected) {
                        CTX.shadowColor = '#FF8C2A';
                        CTX.shadowBlur = 12;
                        CTX.strokeStyle = '#FF8C2A';
                        CTX.lineWidth = 3;
                        CTX.beginPath();
                        CTX.roundRect(tx, ty, tw, th, radius);
                        CTX.stroke();
                        CTX.shadowBlur = 0;
                    }
                }
            }

            if (gameState.path.length > 1 && gameState.animatingPath) {
                // 路徑座標轉換：虛擬邊框點（col<0 / col>=COLS / row<0 / row>=ROWS）
                // 夾在畫面邊緣 3px 內，讓弧形路線完整可見而不被剪裁
                const PAD = 3;
                const pw = offsetX + level.cols * tileSize, ph = offsetY + level.rows * tileSize;
                const px = (c) => {
                    if (c < 0) return PAD;
                    if (c >= level.cols) return pw - PAD;
                    return offsetX + c * tileSize + tileSize / 2;
                };
                const py = (r) => {
                    if (r < 0) return PAD;
                    if (r >= level.rows) return ph - PAD;
                    return offsetY + r * tileSize + tileSize / 2;
                };

                CTX.setLineDash([]);
                CTX.lineCap = 'round';
                CTX.lineJoin = 'round';

                // 外層橘色粗線
                CTX.strokeStyle = 'rgba(255, 180, 0, 0.9)';
                CTX.lineWidth = 5;
                CTX.beginPath();
                CTX.moveTo(px(gameState.path[0][1]), py(gameState.path[0][0]));
                for (let i = 1; i < gameState.path.length; i++) {
                    CTX.lineTo(px(gameState.path[i][1]), py(gameState.path[i][0]));
                }
                CTX.stroke();
                CTX.shadowColor = 'rgba(255, 200, 0, 0.8)';
                CTX.shadowBlur = 8;
                CTX.stroke();
                CTX.shadowBlur = 0;
                // 內層白色細線
                CTX.strokeStyle = 'rgba(255, 255, 255, 0.95)';
                CTX.lineWidth = 2;
                CTX.beginPath();
                CTX.moveTo(px(gameState.path[0][1]), py(gameState.path[0][0]));
                for (let i = 1; i < gameState.path.length; i++) {
                    CTX.lineTo(px(gameState.path[i][1]), py(gameState.path[i][0]));
                }
                CTX.stroke();
                CTX.lineCap = 'butt';
                CTX.lineJoin = 'miter';
            }

            // 連線失敗閃紅光（500ms）
            if (gameState.failFlash && Date.now() - gameState.failFlash.time < 500) {
                const alpha = 1 - (Date.now() - gameState.failFlash.time) / 500;
                CTX.strokeStyle = `rgba(255, 60, 60, ${alpha})`;
                CTX.lineWidth = 4;
                for (const [fr, fc] of gameState.failFlash.cells) {
                    const fx = offsetX + fc * tileSize;
                    const fy = offsetY + fr * tileSize;
                    CTX.strokeRect(fx + 2, fy + 2, tileSize - 4, tileSize - 4);
                }
            } else if (gameState.failFlash && Date.now() - gameState.failFlash.time >= 500) {
                gameState.failFlash = null;
            }

            if (gameState.hint.pair && gameState.hint.showTime && Date.now() - gameState.hint.showTime < 3000) {
                const {r1, c1, r2, c2} = gameState.hint.pair;
                for (const [r, c] of [[r1, c1], [r2, c2]]) {
                    const x = offsetX + c * tileSize;
                    const y = offsetY + r * tileSize;
                    CTX.strokeStyle = '#FFD700';
                    CTX.lineWidth = 3;
                    CTX.strokeRect(x + 4, y + 4, tileSize - 8, tileSize - 8);
                }
            } else {
                gameState.hint.pair = null;
                gameState.hint.showTime = null;
            }
        

            // NO LINK 提示
            if (gameState.noLinkMsg && Date.now() - gameState.noLinkMsg < 2200) {
                const progress = (Date.now() - gameState.noLinkMsg) / 2200;
                const alpha = progress < 0.7 ? 1 : 1 - (progress - 0.7) / 0.3;
                CTX.save();
                CTX.globalAlpha = alpha;
                const msgW = 220, msgH = 54, msgX = (CANVAS.width - msgW) / 2, msgY = (CANVAS.height - 80) / 2 - 27;
                const mg = CTX.createLinearGradient(msgX, msgY, msgX, msgY + msgH);
                mg.addColorStop(0, 'rgba(255,100,60,0.92)');
                mg.addColorStop(1, 'rgba(180,40,20,0.88)');
                CTX.fillStyle = mg;
                CTX.beginPath(); CTX.roundRect(msgX, msgY, msgW, msgH, 14); CTX.fill();
                CTX.strokeStyle = 'rgba(255,200,100,0.7)'; CTX.lineWidth = 2;
                CTX.beginPath(); CTX.roundRect(msgX, msgY, msgW, msgH, 14); CTX.stroke();
                CTX.fillStyle = '#fff';
                CTX.font = 'bold 18px Noto Sans TC';
                CTX.textAlign = 'center';
                CTX.fillText('🔄 重新刷新中', CANVAS.width / 2, msgY + 32);
                CTX.restore();
            } else if (gameState.noLinkMsg && Date.now() - gameState.noLinkMsg >= 2200) {
                gameState.noLinkMsg = null;
            }
        
        }

        function drawStack() {
            const level = LEVELS[gameState.currentLevel];
            const tileWidth = CANVAS.width / level.cols;
            const tileHeight = (CANVAS.height - 80) / level.rows;

            for (let r = 0; r < level.rows; r++) {
                for (let c = 0; c < level.cols; c++) {
                    const colorIdx = gameState.levelData.board[r][c];
                    if (colorIdx === -1) continue;

                    const x = c * tileWidth;
                    const y = r * tileHeight;
                    const spad = 4, sr = 10;
                    const stw = tileWidth - spad*2, sth = tileHeight - spad*2;
                    const stx = x + spad, sty = y + spad;
                    const baseC = STACK_COLORS[colorIdx];
                    const sg = CTX.createLinearGradient(stx, sty, stx, sty + sth);
                    sg.addColorStop(0, baseC + 'ee');
                    sg.addColorStop(1, baseC + '99');
                    CTX.fillStyle = sg;
                    CTX.beginPath(); CTX.roundRect(stx, sty, stw, sth, sr); CTX.fill();
                    // 高光
                    const sh = CTX.createLinearGradient(stx, sty, stx, sty + sth * 0.45);
                    sh.addColorStop(0, 'rgba(255,255,255,0.3)');
                    sh.addColorStop(1, 'rgba(255,255,255,0)');
                    CTX.fillStyle = sh;
                    CTX.beginPath(); CTX.roundRect(stx, sty, stw, sth * 0.5, [sr, sr, 0, 0]); CTX.fill();
                    CTX.strokeStyle = 'rgba(255,255,255,0.3)'; CTX.lineWidth = 1.5;
                    CTX.beginPath(); CTX.roundRect(stx, sty, stw, sth, sr); CTX.stroke();
                }
            }
        }

        function drawUI() {
            // ── 頂部 HUD (y=0-44) ──
            const hudGrad = CTX.createLinearGradient(0, 0, 0, 44);
            hudGrad.addColorStop(0, 'rgba(14, 8, 32, 0.97)');
            hudGrad.addColorStop(1, 'rgba(8, 5, 20, 0.99)');
            CTX.fillStyle = hudGrad;
            CTX.fillRect(0, 0, CANVAS.width, 44);
            
            // 分隔線
            CTX.strokeStyle = 'rgba(255, 160, 40, 0.6)';
            CTX.lineWidth = 1;
            CTX.beginPath();
            CTX.moveTo(0, 44);
            CTX.lineTo(CANVAS.width, 44);
            CTX.stroke();
            
            // ── 左側：關卡 + 分數 ──
            const level = LEVELS[gameState.currentLevel];
            const totalLevels = LEVELS.length;
            
            // 關卡文字（左上）
            CTX.textAlign = 'left';
            CTX.fillStyle = 'rgba(255, 200, 100, 0.85)';
            CTX.font = 'bold 10px Noto Sans TC, sans-serif';
            CTX.fillText('第 ' + (gameState.currentLevel + 1) + '/' + totalLevels + ' 關', 8, 14);
            
            // 分數標籤（左下）
            CTX.fillStyle = 'rgba(255, 180, 80, 0.7)';
            CTX.font = 'bold 10px Noto Sans TC, sans-serif';
            CTX.fillText('分數', 8, 28);
            
            // 分數數值（左下，大字）
            CTX.fillStyle = '#fff';
            CTX.font = 'bold 14px Noto Sans TC, sans-serif';
            CTX.fillText(gameState.score, 8, 40);
            
            // ── 中央：時間標籤 + 時間數字 + 進度條 ──
            const cx = CANVAS.width / 2;
            
            // 時間標籤（中央上方）
            CTX.textAlign = 'center';
            CTX.fillStyle = 'rgba(255, 200, 100, 0.85)';
            CTX.font = 'bold 10px Noto Sans TC, sans-serif';
            CTX.fillText('時間', cx, 12);
            
            // 時間數字（中央，大）
            const timeVal = Math.ceil(Math.max(0, gameState.time));
            CTX.fillStyle = gameState.time <= 10 ? '#FF5555' : (gameState.time <= 20 ? '#FFD700' : '#fff');
            CTX.font = 'bold 17px Noto Sans TC, sans-serif';
            CTX.fillText(timeVal + 's', cx, 30);
            
            // 進度條背景
            const barW = 110, barH = 5;
            const barX = Math.round(cx - barW / 2);
            const barY = 37;
            const timeFrac = Math.max(0, Math.min(1, gameState.time / level.time));
            
            CTX.fillStyle = 'rgba(255, 255, 255, 0.1)';
            CTX.beginPath();
            if (CTX.roundRect) {
                CTX.roundRect(barX, barY, barW, barH, 2);
            } else {
                CTX.rect(barX, barY, barW, barH);
            }
            CTX.fill();
            
            // 進度條（顏色變化）
            const barColor = gameState.time <= 10 ? '#FF4444' : (gameState.time <= 20 ? '#FFD700' : '#2ECC71');
            CTX.fillStyle = barColor;
            CTX.beginPath();
            if (CTX.roundRect) {
                CTX.roundRect(barX, barY, Math.max(3, barW * timeFrac), barH, 2);
            } else {
                CTX.rect(barX, barY, Math.max(3, barW * timeFrac), barH);
            }
            CTX.fill();
            
            // ── COMBO 提示（中央上方，時間標籤位置） ──
            if (gameState.combo > 1) {
                CTX.textAlign = 'center';
                CTX.fillStyle = '#FFD700';
                CTX.font = 'bold 9px Noto Sans TC, sans-serif';
                CTX.fillText('COMBO ×' + gameState.combo + '!', cx, 23);
            }
            
            // ── Hint & Shuffle 按鈕（LLK 專用，移至 HUD 下方調整區） ──
            const llk_level = LEVELS[gameState.currentLevel];
            if (llk_level.type === 'llk') {
                // 💡 提示按鈕
                const hintOk = gameState.hint.available > 0;
                const midX = CANVAS.width / 2;
                const hx = midX - 102, hy = 50, hw = 88, hh = 34;
                const hg = CTX.createLinearGradient(hx, hy, hx, hy + hh);
                if (hintOk) {
                    hg.addColorStop(0, 'rgba(255,215,0,0.30)');
                    hg.addColorStop(1, 'rgba(255,160,0,0.18)');
                } else {
                    hg.addColorStop(0, 'rgba(60,60,80,0.50)');
                    hg.addColorStop(1, 'rgba(40,40,60,0.40)');
                }
                CTX.fillStyle = hg;
                CTX.beginPath();
                if (CTX.roundRect) {
                    CTX.roundRect(hx, hy, hw, hh, 8);
                } else {
                    CTX.rect(hx, hy, hw, hh);
                }
                CTX.fill();
                CTX.strokeStyle = hintOk ? 'rgba(255,215,0,0.7)' : 'rgba(80,80,100,0.5)';
                CTX.lineWidth = 1.5;
                CTX.beginPath();
                if (CTX.roundRect) {
                    CTX.roundRect(hx, hy, hw, hh, 8);
                } else {
                    CTX.rect(hx, hy, hw, hh);
                }
                CTX.stroke();
                CTX.fillStyle = hintOk ? '#FFD700' : '#666';
                CTX.font = 'bold 14px Noto Sans TC';
                CTX.textAlign = 'center';
                CTX.fillText('💡 ×' + gameState.hint.available, hx + hw/2, hy + 22);

                // 🔄 洗牌按鈕
                const shuffleOk = gameState.shuffle.available > 0;
                const sx = midX + 14, sy = 50, sw = 88, sh2 = 34;
                const sg2 = CTX.createLinearGradient(sx, sy, sx, sy + sh2);
                if (shuffleOk) {
                    sg2.addColorStop(0, 'rgba(255,215,0,0.30)');
                    sg2.addColorStop(1, 'rgba(255,160,0,0.18)');
                } else {
                    sg2.addColorStop(0, 'rgba(60,60,80,0.50)');
                    sg2.addColorStop(1, 'rgba(40,40,60,0.40)');
                }
                CTX.fillStyle = sg2;
                CTX.beginPath();
                if (CTX.roundRect) {
                    CTX.roundRect(sx, sy, sw, sh2, 8);
                } else {
                    CTX.rect(sx, sy, sw, sh2);
                }
                CTX.fill();
                CTX.strokeStyle = shuffleOk ? 'rgba(255,215,0,0.7)' : 'rgba(80,80,100,0.5)';
                CTX.lineWidth = 1.5;
                CTX.beginPath();
                if (CTX.roundRect) {
                    CTX.roundRect(sx, sy, sw, sh2, 8);
                } else {
                    CTX.rect(sx, sy, sw, sh2);
                }
                CTX.stroke();
                CTX.fillStyle = shuffleOk ? '#FFD700' : '#666';
                CTX.font = 'bold 14px Noto Sans TC';
                CTX.textAlign = 'center';
                CTX.fillText('🔄 ×' + gameState.shuffle.available, sx + sw/2, sy + 22);
            }
        }

        function drawTitle() {
            // 深色漸層背景 (增強)
            const bg = CTX.createRadialGradient(CANVAS.width/2, CANVAS.height/2, 30, CANVAS.width/2, CANVAS.height/2, 400);
            bg.addColorStop(0, '#1e1560');
            bg.addColorStop(0.5, '#0f0d30');
            bg.addColorStop(1, '#060818');
            CTX.fillStyle = bg;
            CTX.fillRect(0, 0, CANVAS.width, CANVAS.height);

            // 裝飾性橘色圓弧
            CTX.strokeStyle = 'rgba(255, 140, 42, 0.12)';
            CTX.lineWidth = 60;
            CTX.beginPath();
            CTX.arc(CANVAS.width/2, CANVAS.height/2, 200, 0, Math.PI*2);
            CTX.stroke();
            CTX.strokeStyle = 'rgba(255, 140, 42, 0.06)';
            CTX.lineWidth = 100;
            CTX.beginPath();
            CTX.arc(CANVAS.width/2, CANVAS.height/2, 300, 0, Math.PI*2);
            CTX.stroke();

            // 標題 glow
            CTX.shadowColor = '#FF8C2A';
            CTX.shadowBlur = 30;
            CTX.fillStyle = '#FF8C2A';
            CTX.font = 'bold 52px Noto Sans TC';
            CTX.textAlign = 'center';
            CTX.fillText('連連看', CANVAS.width / 2, CANVAS.height / 2 - 40);
            CTX.shadowBlur = 0;

            // 副標
            CTX.fillStyle = 'rgba(255,255,255,0.55)';
            CTX.font = '16px Noto Sans TC';
            CTX.fillText('動物配對消消樂', CANVAS.width / 2, CANVAS.height / 2 + 5);

            // 開始按鈕
            const bx = CANVAS.width/2 - 90, by = CANVAS.height/2 + 45, bw = 180, bh = 48;
            const btnG = CTX.createLinearGradient(bx, by, bx, by+bh);
            btnG.addColorStop(0, '#ff9d47');
            btnG.addColorStop(1, '#FF8C2A');
            CTX.fillStyle = btnG;
            CTX.beginPath(); CTX.roundRect(bx, by, bw, bh, 24); CTX.fill();
            CTX.shadowColor = '#FF8C2A';
            CTX.shadowBlur = 15;
            CTX.fillStyle = '#fff';
            CTX.font = 'bold 20px Noto Sans TC';
            CTX.fillText('▶ 點擊開始', CANVAS.width/2, by + 31);
            CTX.shadowBlur = 0;

            // 小提示
            CTX.fillStyle = 'rgba(255,255,255,0.30)';
            CTX.font = '12px Noto Sans TC';
            CTX.fillText('路否羅遊戲平台', CANVAS.width/2, CANVAS.height - 25);
        }

        function drawLevelClear() {
            // 半透明遮罩
            const mask = CTX.createRadialGradient(CANVAS.width/2, CANVAS.height/2, 0, CANVAS.width/2, CANVAS.height/2, 250);
            mask.addColorStop(0, 'rgba(20,30,60,0.88)');
            mask.addColorStop(1, 'rgba(8,12,26,0.72)');
            CTX.fillStyle = mask;
            CTX.fillRect(0, 0, CANVAS.width, CANVAS.height);

            // 卡片
            const cx = CANVAS.width/2, cy = CANVAS.height/2;
            const cw = 260, ch = 140, cr = 20;
            const cardG = CTX.createLinearGradient(cx-cw/2, cy-ch/2, cx-cw/2, cy+ch/2);
            cardG.addColorStop(0, 'rgba(255,215,0,0.22)');
            cardG.addColorStop(1, 'rgba(255,140,42,0.12)');
            CTX.fillStyle = cardG;
            CTX.beginPath(); CTX.roundRect(cx-cw/2, cy-ch/2, cw, ch, cr); CTX.fill();
            CTX.strokeStyle = 'rgba(255,215,0,0.6)'; CTX.lineWidth = 2;
            CTX.beginPath(); CTX.roundRect(cx-cw/2, cy-ch/2, cw, ch, cr); CTX.stroke();

            CTX.shadowColor = '#FFD700'; CTX.shadowBlur = 20;
            CTX.fillStyle = '#FFD700';
            CTX.font = 'bold 38px Noto Sans TC';
            CTX.textAlign = 'center';
            CTX.fillText('✨ 過關！', cx, cy - 10);
            CTX.shadowBlur = 0;
            CTX.fillStyle = 'rgba(255,255,255,0.8)';
            CTX.font = '16px Noto Sans TC';
            CTX.fillText(`得分：${gameState.score}`, cx, cy + 30);
            CTX.fillStyle = 'rgba(255,255,255,0.45)';
            CTX.font = '13px Noto Sans TC';
            CTX.fillText('點擊繼續下一關', cx, cy + 55);
        }

        function drawGameOver() {
            const mask2 = CTX.createRadialGradient(CANVAS.width/2, CANVAS.height/2, 0, CANVAS.width/2, CANVAS.height/2, 250);
            mask2.addColorStop(0, 'rgba(40,0,0,0.88)');
            mask2.addColorStop(1, 'rgba(8,12,26,0.72)');
            CTX.fillStyle = mask2;
            CTX.fillRect(0, 0, CANVAS.width, CANVAS.height);

            const cx2 = CANVAS.width/2, cy2 = CANVAS.height/2;
            const cw2 = 260, ch2 = 140, cr2 = 20;
            const cg2 = CTX.createLinearGradient(cx2-cw2/2, cy2-ch2/2, cx2-cw2/2, cy2+ch2/2);
            cg2.addColorStop(0, 'rgba(255,80,80,0.22)');
            cg2.addColorStop(1, 'rgba(180,30,30,0.14)');
            CTX.fillStyle = cg2;
            CTX.beginPath(); CTX.roundRect(cx2-cw2/2, cy2-ch2/2, cw2, ch2, cr2); CTX.fill();
            CTX.strokeStyle = 'rgba(255,80,80,0.6)'; CTX.lineWidth = 2;
            CTX.beginPath(); CTX.roundRect(cx2-cw2/2, cy2-ch2/2, cw2, ch2, cr2); CTX.stroke();

            CTX.shadowColor = '#FF4444'; CTX.shadowBlur = 20;
            CTX.fillStyle = '#FF6060';
            CTX.font = 'bold 38px Noto Sans TC';
            CTX.textAlign = 'center';
            CTX.fillText('⏰ 時間到！', cx2, cy2 - 10);
            CTX.shadowBlur = 0;
            CTX.fillStyle = 'rgba(255,255,255,0.8)';
            CTX.font = '16px Noto Sans TC';
            CTX.fillText(`最終得分：${gameState.score}`, cx2, cy2 + 30);
            CTX.fillStyle = 'rgba(255,255,255,0.45)';
            CTX.font = '13px Noto Sans TC';
            CTX.fillText('點擊重新開始', cx2, cy2 + 55);
        }

        function draw() {
            CTX.fillStyle = '#0a0e22';
            CTX.fillRect(0, 0, CANVAS.width, CANVAS.height);

            if (gameState.state === 'title') {
                drawTitle();
            } else if (gameState.state === 'playing') {
                const level = LEVELS[gameState.currentLevel];
                if (level.type === 'llk') {
                    drawLLK();
                } else {
                    drawStack();
                }
                drawUI();
            } else if (gameState.state === 'lvlclear') {
                const level = LEVELS[gameState.currentLevel];
                if (level.type === 'llk') {
                    drawLLK();
                } else {
                    drawStack();
                }
                drawUI();
                drawLevelClear();
            } else if (gameState.state === 'gameover') {
                const level = LEVELS[gameState.currentLevel];
                if (level.type === 'llk') {
                    drawLLK();
                } else {
                    drawStack();
                }
                drawUI();
                drawGameOver();
            }

            drawParticles();
        }

        let lastTime = Date.now();

        function gameLoop() {
            const now = Date.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            if (gameState.state === 'playing') {
                gameState.time -= dt;
                if (gameState.time <= 0) {
                    gameState.time = 0;
                    gameState.state = 'gameover';  // 時間到直接進入 gameover
                    // 直接進入排行榜，不顯示分數畫面
                    namePhase = "postgame";
                    showNameOverlay();
                }

                if (Date.now() - gameState.lastComboTime > 3000) {
                    gameState.combo = 0;
                }
            }

            if (gameState.state === 'lvlclear') {
                // 剩餘時間轉換為分數：1秒 = 10分
                var timeBonus = Math.floor(gameState.time) * 10;
                // 未用完道具各 +100 分
                var hintBonus = gameState.hint.available * 100;
                var shuffleBonus = gameState.shuffle.available * 100;
                gameState.score += timeBonus + hintBonus + shuffleBonus;
                gameState.time = 0;  // 清除剩餘時間
                gameState.state = 'videoplay';
                showClearVideo(() => {
                    if (gameState.currentLevel < LEVELS.length - 1) {
                        initLevel(gameState.currentLevel + 1);
                    } else {
                        gameState.state = 'allclear';
                        showNameOverlay();
                    }
                });
            }

            updateParticles(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }

                let levelClearPending = false;
        function showClearVideo(onEnd) {
            const overlay = document.getElementById('videoOverlay');
            const video = document.getElementById('clearVideo');
            overlay.style.display = 'flex';
            video.currentTime = 0;
            video.muted = true;  // 確保 autoplay 不被瀏覽器阻擋
            video.play().catch(() => { onEnd(); });
            const handler = () => {
                overlay.style.display = 'none';
                video.removeEventListener('ended', handler);
                onEnd();
            };
            video.addEventListener('ended', handler);
            // 最多 10 秒後強制結束
            setTimeout(() => {
                if (overlay.style.display !== 'none') {
                    overlay.style.display = 'none';
                    video.removeEventListener('ended', handler);
                    onEnd();
                }
            }, 10000);
        }

function showNameOverlay() {
            if (namePhase === "pregame") {
                // 遊戲開始前輸入名字
                document.getElementById('finalScore').textContent = '';
                document.querySelector('.g-overlay-title').textContent = '準備挑戰連連看！';
                document.getElementById('submitBtn').textContent = '挑戰開始';
                
                // 嘗試從 localStorage 載入上次輸入的名字
                const savedName = localStorage.getItem('platform_player_name') || '';
                document.getElementById('playerNameInput').value = savedName;
            } else {
                // 遊戲完成後提交排行榜
                document.getElementById('finalScore').textContent = `最終分數: ${gameState.score}`;
                document.querySelector('.g-overlay-title').textContent = '遊戲結束！';
                document.getElementById('submitBtn').textContent = '提交排行榜';
                // 預填上次使用的名字，讓玩家不必重輸
                const savedName = localStorage.getItem('platform_player_name') || '';
                document.getElementById('playerNameInput').value = savedName;
            }
            document.getElementById('nameOverlay').classList.add('active');
            document.getElementById('playerNameInput').focus();
        }

        function showLeaderboard() {
            document.getElementById('lbOverlay').classList.add('active');
            loadLeaderboard();
        }

        function hideOverlay() {
            document.getElementById('nameOverlay').classList.remove('active');
            document.getElementById('lbOverlay').classList.remove('active');
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch(`${FB_URL}/${FB_PATH}.json?orderBy="score"&limitToLast=10`);
                const data = await response.json();
                const list = document.getElementById('leaderboardList');
                list.innerHTML = '';

                if (!data) {
                    list.innerHTML = '<div style="color:#aaa;padding:20px;">暫無排行榜記錄</div>';
                    return;
                }

                const entries = Object.values(data).sort((a, b) => b.score - a.score);
                entries.forEach((entry, idx) => {
                    const item = document.createElement('div');
                    item.className = 'g-lb-item';
                    item.innerHTML = `<div class="g-lb-rank">#${idx+1}</div><div class="g-lb-name">${entry.name||'匿名'}</div><div class="g-lb-score">${entry.score}</div>`;
                    list.appendChild(item);
                });
            } catch (err) {
                console.error('讀取排行榜失敗', err);
                document.getElementById('leaderboardList').innerHTML = '<div style="color:#aaa;padding:20px;">讀取排行榜失敗</div>';
            }
        }

        let isSubmitting = false;  // 防止重複提交

        async function submitScore(name) {
            // pregame 階段：輸入名字開始遊戲
            if (namePhase === "pregame") {
                const finalName = name.trim() || '匿名';
                localStorage.setItem('platform_player_name', finalName);
                hideOverlay();
                namePhase = "postgame";
                initLevel(0);  // 開始遊戲
                return;
            }
            
            // postgame 階段：提交排行榜
            if (isSubmitting) return;  // 防止重複點擊
            const finalName = name.trim() || '匿名';
            
            isSubmitting = true;
            const btn = document.getElementById('submitBtn');
            btn.textContent = '提交中...';
            btn.disabled = true;

            // 儲存名字供下次使用
            localStorage.setItem('platform_player_name', finalName);

            try {
                const response = await fetch(`${FB_URL}/${FB_PATH}.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: finalName,
                        score: gameState.score,
                        date: new Date().toISOString()
                    })
                });
                // 無論成功或失敗，都進入排行榜畫面，不卡在 overlay
                gameState.state = 'leaderboard';
                hideOverlay();
                showLeaderboard();
                if (!response.ok) {
                    console.warn('提交分數回傳非 200，仍顯示排行榜');
                }
            } catch (err) {
                console.error('提交分數失敗', err);
                // 網路錯誤時也要放行，不卡住
                gameState.state = 'leaderboard';
                hideOverlay();
                showLeaderboard();
            } finally {
                isSubmitting = false;
                btn.textContent = '提交排行榜';
                btn.disabled = false;
            }
        }

        CANVAS.addEventListener('mousemove', (e) => {
            if (gameState.state !== 'playing') return;
            const rect = CANVAS.getBoundingClientRect();
            const scaleY = CANVAS.height / rect.height;
            const y = (e.clientY - rect.top) * scaleY;
            const level = LEVELS[gameState.currentLevel];
            if (y >= CANVAS.height - 50 && level.type === 'llk') {
                CANVAS.style.cursor = 'pointer';
            } else {
                CANVAS.style.cursor = 'default';
            }
        });

        CANVAS.addEventListener('click', (e) => {
            if (gameState.state === 'title') {
                namePhase = "pregame";
                showNameOverlay();
            } else if (gameState.state === 'gameover') {
                // 遊戲結束 → 允許上榜
                namePhase = "postgame";
                showNameOverlay();
            } else {
                handleCanvasClick(e);
            }
        });

        document.addEventListener('keydown', (e) => {
            if (gameState.state !== 'playing') return;
            if (e.key === 'h' || e.key === 'H') handleHint();
            if (e.key === 's' || e.key === 'S') handleShuffle();
        });

        document.getElementById('submitBtn').addEventListener('click', () => {
            const name = document.getElementById('playerNameInput').value;
            submitScore(name);
        });

        document.getElementById('playerNameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const name = document.getElementById('playerNameInput').value;
                submitScore(name);
            }
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            const name = document.getElementById('playerNameInput').value.trim() || '匿名玩家';
            const score = gameState.score;
            const shareText = `🎯 ${name} 在動物連連看拿到 ${score} 分！\n🏆 來路否羅挑戰我吧！\nhttps://zoo-forest-can.github.io/island/`;
            if (navigator.share) {
                navigator.share({ title: '動物連連看', text: shareText }).catch(() => {});
            } else {
                navigator.clipboard.writeText(shareText).then(() => alert('成績已複製！')).catch(() => alert(shareText));
            }
        });

        // 排行榜頁面的分享按鈕
        if (document.getElementById('lbShareBtn')) {
            document.getElementById('lbShareBtn').addEventListener('click', () => {
                const name = document.getElementById('playerNameInput')?.value?.trim() || '匿名玩家';
                const score = gameState.score;
                const shareText = `🎯 ${name} 在動物連連看拿到 ${score} 分！\n🏆 來路否羅挑戰我吧！\nhttps://zoo-forest-can.github.io/island/`;
                if (navigator.share) {
                    navigator.share({ title: '動物連連看', text: shareText }).catch(() => {});
                } else {
                    navigator.clipboard.writeText(shareText).then(() => alert('成績已複製！')).catch(() => alert(shareText));
                }
            });
        }
        // 再玩一次按鈕（回到第一關重新開始）
        if (document.getElementById('playAgainBtn')) {
            document.getElementById('playAgainBtn').addEventListener('click', () => {
                hideOverlay();
                namePhase = "pregame";
                showNameOverlay();
            });
        }
        document.getElementById('restartBtn').addEventListener('click', () => {
            hideOverlay();
            gameState.state = 'title';
            gameState.currentLevel = 0;
            gameState.score = 0;
        });

        document.getElementById('fs-btn').addEventListener('click', () => {
            const canvasWrap = document.getElementById('canvasWrap');
            if (!document.fullscreenElement) {
                canvasWrap.requestFullscreen().catch(err => console.error('全螢幕失敗', err));
            } else {
                document.exitFullscreen();
            }
        });

        gameState.state = 'title';
        gameLoop();
            document.getElementById('mute-btn').addEventListener('click', () => {
            isMuted = !isMuted;
            document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
            const video = document.getElementById('clearVideo');
            if (video) video.muted = isMuted;
            if (isMuted) {
                stopMusic();
            } else {
                musicStarted = false;
                startMusic();
            }
        });

    </script>
</body>
